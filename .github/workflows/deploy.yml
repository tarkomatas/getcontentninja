name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# A GitHub Pages deploy-hoz szükséges jogosultságok
permissions:
  contents: read
  pages: write
  id-token: write

# Egyszerre egy deploy fusson; a folyamatban lévőt ne szakítsuk meg
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # A withastro/action telepíti a függőségeket, lefuttatja az `astro build`-ot,
        # és feltölti a dist/ mappát Pages-artefaktumként.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
